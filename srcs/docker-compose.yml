
services:
  nginx:
    build: ./requirements/nginx/.
    container_name: nginx
    restart: on-failure
    ports:
      - "443:443"
    volumes:
      - wp_data:/var/www/html
    networks:
      - inception-network
    depends_on:
      - wordpress

  wordpress:
    build: ./requirements/wordpress/.
    container_name: wordpress
    restart: on-failure
    env_file:
      - .env
    volumes:
      - wp_data:/var/www/html
    networks:
      - inception-network
    depends_on:
      - mariadb

  mariadb:
    build: ./requirements/mariadb/.
    container_name: mariadb
    restart: on-failure
    env_file:
      - .env
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - inception-network


volumes:
  # Volumen Docker para los archivos de WordPress
  wp_data:
    driver: local

  # Volumen Docker para la base de datos
  db_data:
    driver: local

networks:
  inception-network:
    driver: bridge


